<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class Review Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Arial, sans-serif;
  background: #0D0B2A;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 1.5rem 1rem 3rem;
  color: #fff;
}

h1 { font-size: 26px; font-weight: 700; color: #C4B5FD; margin-bottom: 0.25rem; letter-spacing: 0.5px; }
.subtitle { font-size: 14px; color: #6B7280; margin-bottom: 1.5rem; }

/* counters */
#counters {
  display: flex; gap: 1rem; margin-bottom: 1.5rem;
}
.counter-box {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 6px 18px;
  text-align: center; min-width: 80px;
}
.counter-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
.counter-val   { font-size: 22px; font-weight: 700; color: #facc15; }

/* slot machine */
#slot-wrap {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(108,63,197,0.5);
  border-radius: 16px;
  padding: 1.5rem 2rem;
  width: 100%; max-width: 540px;
  margin-bottom: 1.25rem;
  text-align: center;
}
#slot-label { font-size: 13px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.75rem; }
#slot-window {
  background: #1a1240;
  border: 2px solid #6C3FC5;
  border-radius: 12px;
  height: 72px;
  overflow: hidden;
  position: relative;
  margin-bottom: 1rem;
}
#slot-reel {
  position: absolute; left: 0; right: 0;
  transition: top 0.05s linear;
}
.slot-item {
  height: 72px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; font-weight: 700; color: #fff;
  letter-spacing: 0.5px;
}
#spin-btn {
  background: #6C3FC5; color: #fff;
  border: none; border-radius: 10px;
  padding: 12px 36px; font-size: 16px; font-weight: 700;
  cursor: pointer; font-family: Arial, sans-serif;
  transition: background 0.15s, transform 0.1s;
}
#spin-btn:hover:not(:disabled) { background: #4A2890; }
#spin-btn:active:not(:disabled) { transform: scale(0.97); }
#spin-btn:disabled { background: #3D2E6B; color: #666; cursor: default; }

/* question card */
#q-card {
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,159,28,0.4);
  border-radius: 16px;
  padding: 1.5rem 1.75rem;
  width: 100%; max-width: 540px;
  margin-bottom: 1.25rem;
  display: none;
}
#q-category {
  font-size: 11px; color: #FF9F1C; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 0.5rem; font-weight: 700;
}
#q-text {
  font-size: 18px; font-weight: 600; color: #fff;
  line-height: 1.55; margin-bottom: 1.25rem;
}
#choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1rem; }
.choice {
  background: #1a1240;
  border: 1.5px solid rgba(255,255,255,0.12);
  border-radius: 10px; padding: 12px 10px;
  font-size: 15px; color: #e2e8f0;
  cursor: pointer; text-align: center;
  transition: background 0.15s, border-color 0.15s, transform 0.1s;
  font-family: Arial, sans-serif; font-weight: 500; line-height: 1.4;
}
.choice:hover:not(:disabled) { background: #2D2060; border-color: #6C3FC5; }
.choice:active:not(:disabled) { transform: scale(0.97); }
.choice.correct { background: #1a3a1a; border-color: #3B6D11; color: #86efac; }
.choice.wrong   { background: #3a1a1a; border-color: #A32D2D; color: #fca5a5; }
.choice:disabled { cursor: default; }

#feedback-text {
  min-height: 40px; font-size: 14px; color: #94a3b8;
  text-align: center; line-height: 1.5; margin-bottom: 0.5rem;
}
#chosen-name-display {
  text-align: center; font-size: 15px; color: #C4B5FD;
  margin-bottom: 0.5rem;
}

/* stats screen */
#stats-screen {
  display: none;
  width: 100%; max-width: 540px;
  text-align: center;
}
#stats-screen h2 { font-size: 26px; color: #C4B5FD; margin-bottom: 0.5rem; }
#stats-screen .big { font-size: 52px; font-weight: 700; color: #facc15; line-height: 1; margin-bottom: 0.25rem; }
#stats-screen .sub { font-size: 14px; color: #94a3b8; margin-bottom: 1.5rem; }
#stats-table {
  width: 100%; border-collapse: collapse;
  margin-bottom: 1.5rem; font-size: 14px;
}
#stats-table th {
  background: rgba(108,63,197,0.35);
  color: #C4B5FD; padding: 8px 12px;
  text-align: left; font-weight: 700;
}
#stats-table td {
  padding: 7px 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
  color: #e2e8f0;
}
#stats-table tr:nth-child(even) td { background: rgba(255,255,255,0.03); }
.tick  { color: #86efac; font-weight: 700; }
.cross { color: #fca5a5; font-weight: 700; }

#play-again-btn {
  background: #6C3FC5; color: #fff;
  border: none; border-radius: 10px;
  padding: 13px 40px; font-size: 17px; font-weight: 700;
  cursor: pointer; font-family: Arial, sans-serif;
  transition: background 0.15s;
}
#play-again-btn:hover { background: #4A2890; }
</style>
</head>
<body>

<h1>🎡 Class Review Game</h1>
<p class="subtitle">Cinder Al &amp; Grammar Review</p>

<div id="counters">
  <div class="counter-box">
    <div class="counter-label">Students left</div>
    <div class="counter-val" id="students-left">30</div>
  </div>
  <div class="counter-box">
    <div class="counter-label">Correct</div>
    <div class="counter-val" id="correct-count" style="color:#86efac">0</div>
  </div>
  <div class="counter-box">
    <div class="counter-label">Wrong</div>
    <div class="counter-val" id="wrong-count" style="color:#fca5a5">0</div>
  </div>
</div>

<div id="slot-wrap">
  <div id="slot-label">Spin to pick a student</div>
  <div id="slot-window"><div id="slot-reel"></div></div>
  <button id="spin-btn">🎰 Spin!</button>
</div>

<div id="chosen-name-display"></div>

<div id="q-card">
  <div id="q-category"></div>
  <div id="q-text"></div>
  <div id="choices"></div>
  <div id="feedback-text"></div>
</div>

<div id="stats-screen">
  <h2>🏆 Round Complete!</h2>
  <div class="big" id="final-score"></div>
  <div class="sub" id="final-sub"></div>
  <table id="stats-table">
    <thead><tr><th>Student</th><th>Question</th><th>Result</th></tr></thead>
    <tbody id="stats-body"></tbody>
  </table>
  <button id="play-again-btn" onclick="resetGame()">Play Again</button>
</div>

<script>
// ── NAMES ───────────────────────────────────────────────────────────────────
const ALL_NAMES = ["Ann","Dora","Freya","Chloe","Goofy","Kyle 302","Jayden","Elma","Marcus","Arno","Roy","Ryder","Lynn","Ray","Kyle 304","Cory","William","Devin","Vanessa","Derek","Harris","Oliver","Yan Yan","Kemmy","Cynthia","Euphie","Jie","Wayne","Brian","Eason"];

// ── QUESTION BANK (55 questions) ─────────────────────────────────────────────
const ALL_QUESTIONS = [

  // ── STORY: Characters ────────────────────────────────────────────────────
  { cat:"Story: Characters", q:"What is the main character's name?", choices:["Steve","Owen","Al","Peeyu"], ans:2 },
  { cat:"Story: Characters", q:"What does Stinky Steve do every day?", choices:["Grows onions","Wrestles skunks","Cleans fireplaces","Bakes bread"], ans:1 },
  { cat:"Story: Characters", q:"What does Owen grow on his farm?", choices:["Garlic","Potatoes","Onions","Cabbages"], ans:2 },
  { cat:"Story: Characters", q:"Who is the ruler of Stinky Hollow?", choices:["Stinky Steve","Cinder Al","Princess Peeyu","The Fairy Godmother"], ans:2 },
  { cat:"Story: Characters", q:"Who comes to help Al at night?", choices:["Princess Peeyu","His Fairy Godmother","Owen","Steve"], ans:1 },
  { cat:"Story: Characters", q:"How many brothers are in the story?", choices:["Two","Three","Four","Five"], ans:1 },
  { cat:"Story: Characters", q:"Which brother is the oldest?", choices:["Al","Owen","Steve","Roy"], ans:2 },
  { cat:"Story: Characters", q:"Why do Al's brothers call him 'Cinder Al'?", choices:["He is always cold","He loves cleaning the fireplace","He smells like smoke","He wears grey clothes"], ans:1 },

  // ── STORY: Plot ───────────────────────────────────────────────────────────
  { cat:"Story: Plot", q:"What does Princess Peeyu send out to find a dance partner?", choices:["A letter","A royal message","A newspaper ad","An invitation card"], ans:1 },
  { cat:"Story: Plot", q:"What must someone do to dance with Princess Peeyu?", choices:["Win a skunk fight","Grow the biggest onion","Wear the stinky shoes","Clean the palace"], ans:2 },
  { cat:"Story: Plot", q:"What does Steve do when he tries on the stinky shoes?", choices:["He faints","He screams and runs away","He dances","He laughs"], ans:1 },
  { cat:"Story: Plot", q:"What does Owen do when he smells the shoes?", choices:["He runs away","He sneezes","He faints","He cries"], ans:2 },
  { cat:"Story: Plot", q:"What does Al take with him to the palace?", choices:["A sword","A clothespin and cleaning supplies","Some flowers","A magic wand"], ans:1 },
  { cat:"Story: Plot", q:"What does Al do to the shoes before he puts them on?", choices:["He burns them","He throws them away","He cleans them until they smell nice","He paints them"], ans:2 },
  { cat:"Story: Plot", q:"What does Al put on his nose at the palace?", choices:["A flower","A clothespin","A bandage","A rubber band"], ans:1 },
  { cat:"Story: Plot", q:"How does the story end?", choices:["Al runs away","Al and Princess Peeyu live happily ever after","Steve wins","Owen becomes king"], ans:1 },
  { cat:"Story: Plot", q:"What is the name of the land in the story?", choices:["Sweet Valley","Flower Kingdom","Stinky Hollow","Garlic Gardens"], ans:2 },
  { cat:"Story: Plot", q:"The shoes smelled like a skunk eating what?", choices:["Rotten bananas","Four rotten eggs","Old cheese","Onion soup"], ans:1 },

  // ── STORY: Vocabulary ─────────────────────────────────────────────────────
  { cat:"Story: Vocabulary", q:"What does 'pungent' mean?", choices:["Very loud","Very bright","Strong, bad smell","Very soft"], ans:2 },
  { cat:"Story: Vocabulary", q:"What is a 'proclamation'?", choices:["A type of dance","An important message for everyone","A new law","A royal game"], ans:1 },
  { cat:"Story: Vocabulary", q:"What does 'upcoming' mean?", choices:["Already finished","Far away in time","Happening soon","Happening right now"], ans:2 },
  { cat:"Story: Vocabulary", q:"What does 'snickered' mean?", choices:["Laughed happily","Laughed in a rude way","Cried quietly","Shouted angrily"], ans:1 },
  { cat:"Story: Vocabulary", q:"Cinders come from a fireplace. What are cinders?", choices:["Flowers","Ash left after a fire","Pieces of ice","Food scraps"], ans:1 },
  { cat:"Story: Vocabulary", q:"Steve 'raced out of the palace.' What does 'raced' mean?", choices:["Walked slowly","Ran very fast","Skipped happily","Crept quietly"], ans:1 },
  { cat:"Story: Vocabulary", q:"Owen is called 'Odoriferous Owen.' What does odoriferous mean?", choices:["Very fast","Very smelly","Very clever","Very tall"], ans:1 },

  // ── STORY: Genre ──────────────────────────────────────────────────────────
  { cat:"Story: Genre", q:"What type of story is 'Cinder Al'?", choices:["News article","Science fiction","Fairy tale","Mystery"], ans:2 },
  { cat:"Story: Genre", q:"Which famous fairy tale is 'Cinder Al' based on?", choices:["Snow White","Sleeping Beauty","Cinderella","Rapunzel"], ans:2 },
  { cat:"Story: Genre", q:"How does 'Cinder Al' begin?", choices:['"Long, long ago..."','"Dear reader..."','"Once upon a time..."','"In the future..."'], ans:2 },
  { cat:"Story: Genre", q:"Fairy tales often have what kind of characters?", choices:["Only real people","Kings, queens, and magic","Only animals","Only children"], ans:1 },
  { cat:"Story: Genre", q:"'Happily ever after' is from which type of story?", choices:["News report","Fairy tale","Poem","Science fiction"], ans:1 },
  { cat:"Story: Genre", q:"What is different about Cinder Al compared to Cinderella?", choices:["No magic in the story","The main character is a boy","No royal characters","The story has no ending"], ans:1 },

  // ── GRAMMAR: Adjectives ───────────────────────────────────────────────────
  { cat:"Grammar: Adjectives", q:"Find the adjective: 'Tanner wore a striped shirt.'", choices:["wore","shirt","striped","Tanner"], ans:2 },
  { cat:"Grammar: Adjectives", q:"Find the adjective: 'Blair's aunt drives a pink truck.'", choices:["drives","truck","aunt","pink"], ans:3 },
  { cat:"Grammar: Adjectives", q:"What does an adjective do?", choices:["Replaces a noun","Describes a noun","Shows an action","Joins two sentences"], ans:1 },
  { cat:"Grammar: Adjectives", q:"Find the adjective (how many): 'She saw three birds.'", choices:["saw","birds","three","nest"], ans:2 },
  { cat:"Grammar: Adjectives", q:"Find the adjective (how many): 'There are several dogs in the park.'", choices:["several","dogs","park","are"], ans:0 },
  { cat:"Grammar: Adjectives", q:"Find the adjective (what kind): 'Jack chose the colorful cover.'", choices:["chose","cover","colorful","Jack"], ans:2 },
  { cat:"Grammar: Adjectives", q:"Which sentence has a 'what kind' adjective?", choices:["She has many cats.","The cat has four legs.","She has a fluffy cat.","I see two birds."], ans:2 },
  { cat:"Grammar: Adjectives", q:"'This' and 'that' are adjectives that tell us what?", choices:["How many","Which one","What kind","Nothing"], ans:1 },

  // ── GRAMMAR: Articles ─────────────────────────────────────────────────────
  { cat:"Grammar: Articles", q:"Which words are articles?", choices:["this, that, these","a, an, the","big, small, tall","run, jump, fly"], ans:1 },
  { cat:"Grammar: Articles", q:"Which is correct? '___ bicycle'", choices:["an bicycle","a bicycle","the only one","no article"], ans:1 },
  { cat:"Grammar: Articles", q:"Which is correct? '___ airplane'", choices:["a airplane","an airplane","the only","no article"], ans:1 },
  { cat:"Grammar: Articles", q:"Which is correct? '___ apple'", choices:["a apple","an apple","the only","no article"], ans:1 },
  { cat:"Grammar: Articles", q:"Which sentence is correct?", choices:["I have an bicycle.","She ate a apple.","He found an interesting book.","They saw a elephant."], ans:2 },
  { cat:"Grammar: Articles", q:"'The' can go before which nouns?", choices:["Only one noun","Only many nouns","Both one and many nouns","Only vowel nouns"], ans:2 },
  { cat:"Grammar: Articles", q:"Fill in the blank: 'We went to ___ new hospital.' (Hint: we don't know which hospital yet!)", choices:["an","the","a","no word"], ans:2 },

  // ── GRAMMAR: Comparing with -er ───────────────────────────────────────────
  { cat:"Grammar: -er / more", q:"How do you compare 'large'? (2 things)", choices:["more large","largeer","larger","most large"], ans:2 },
  { cat:"Grammar: -er / more", q:"How do you compare 'difficult'? (2 things)", choices:["difficulter","difficultier","more difficult","most difficult"], ans:2 },
  { cat:"Grammar: -er / more", q:"How do you compare 'noisy'? (2 things)", choices:["noisyer","more noisy","noisier","most noisy"], ans:2 },
  { cat:"Grammar: -er / more", q:"How do you compare 'big'? (2 things)", choices:["biger","bigger","more big","bigest"], ans:1 },
  { cat:"Grammar: -er / more", q:"How do you compare 'fat'? (2 things)", choices:["fater","more fat","fattest","fatter"], ans:3 },
  { cat:"Grammar: -er / more", q:"When do you use 'more' instead of adding -er?", choices:["Short words","Words ending in -y","Long words (2+ syllables)","All words"], ans:2 },
  { cat:"Grammar: -er / more", q:"Fill in the blank: 'Anna is ___ than Mark.'", choices:["tallest","more taller","taller","most tall"], ans:2 },
  { cat:"Grammar: -er / more", q:"Fill in the blank: 'The watermelon is ___ than the cantaloupe.'", choices:["more large","largest","larger","most large"], ans:2 },

  // ── GRAMMAR: Comparing with -est ─────────────────────────────────────────
  { cat:"Grammar: -est / most", q:"How do you compare 'hot'? (3+ things)", choices:["hotest","hottest","most hot","hotter"], ans:1 },
  { cat:"Grammar: -est / most", q:"How do you compare 'interesting'? (3+ things)", choices:["interestingest","more interesting","most interesting","interestinger"], ans:2 },
  { cat:"Grammar: -est / most", q:"How do you compare 'fast'? (3+ things)", choices:["more fast","fastest","more fastest","most fast"], ans:1 },
  { cat:"Grammar: -est / most", q:"Fill in the blank: 'Jim's book is the ___ in the class.'", choices:["longer","most long","longiest","longest"], ans:3 },
  { cat:"Grammar: -est / most", q:"Fill in the blank: 'Dean makes the ___ meals.'", choices:["deliciousest","most delicious","more delicious","deliciouser"], ans:1 },
  { cat:"Grammar: -est / most", q:"When do you use '-est'?", choices:["Comparing 2 things","Comparing 3 or more things","Words ending in -y","Always"], ans:1 },
  { cat:"Grammar: -est / most", q:"Which sentence is correct?", choices:["She is the tallest of the two.","He is the most tallest.","That is the most interesting story.","He is more fastest."], ans:2 },

];

// ── GAME STATE ──────────────────────────────────────────────────────────────
let namePool      = [];
let questionPool  = [];
let usedNames     = [];
let results       = [];
let currentName   = null;
let currentQ      = null;
let spinning      = false;
let answered      = false;
let totalCorrect  = 0;
let totalWrong    = 0;

// ── SLOT MACHINE ─────────────────────────────────────────────────────────────
const reel     = document.getElementById("slot-reel");
const spinBtn  = document.getElementById("spin-btn");
let spinTimer  = null;
let spinSpeed  = 40;
let spinCount  = 0;
let spinTarget = 0;
let reelNames  = [];
let reelIndex  = 0;

function buildReel() {
  reelNames = [...namePool].sort(() => Math.random() - 0.5);
  reel.innerHTML = "";
  reelNames.forEach(n => {
    const div = document.createElement("div");
    div.className = "slot-item";
    div.textContent = n;
    reel.appendChild(div);
  });
  reel.style.top = "0px";
  reelIndex = 0;
}

function stepReel() {
  reelIndex = (reelIndex + 1) % reelNames.length;
  reel.style.top = (-reelIndex * 72) + "px";
}

function startSpin() {
  if (spinning || namePool.length === 0) return;
  answered = false;
  spinning = true;
  spinBtn.disabled = true;
  document.getElementById("q-card").style.display = "none";
  document.getElementById("chosen-name-display").textContent = "";
  document.getElementById("feedback-text").textContent = "";

  buildReel();
  spinCount  = 0;
  spinTarget = 30 + Math.floor(Math.random() * 20);
  spinSpeed  = 40;

  function tick() {
    stepReel();
    spinCount++;
    if (spinCount >= spinTarget) {
      // slow down
      spinSpeed += 30;
    }
    if (spinCount >= spinTarget + 5) {
      finishSpin();
      return;
    }
    spinTimer = setTimeout(tick, spinSpeed);
  }
  tick();
}

function finishSpin() {
  spinning = false;
  currentName = reelNames[reelIndex];

  // remove from pool
  namePool = namePool.filter(n => n !== currentName);
  usedNames.push(currentName);
  document.getElementById("students-left").textContent = namePool.length;

  document.getElementById("chosen-name-display").textContent = "🎯 " + currentName + " — your turn!";
  showQuestion();
}

// ── QUESTION ─────────────────────────────────────────────────────────────────
function showQuestion() {
  if (questionPool.length === 0) {
    questionPool = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
  }
  currentQ = questionPool.pop();

  const card = document.getElementById("q-card");
  card.style.display = "block";
  document.getElementById("q-category").textContent = currentQ.cat;
  document.getElementById("q-text").textContent = currentQ.q;
  document.getElementById("feedback-text").textContent = "";

  // shuffle display order
  const order = [0,1,2,3].sort(() => Math.random() - 0.5);
  const choicesEl = document.getElementById("choices");
  choicesEl.innerHTML = "";
  order.forEach(origIdx => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = currentQ.choices[origIdx];
    btn.onclick = () => selectAnswer(origIdx, btn, order);
    choicesEl.appendChild(btn);
  });
  answered = false;
}

function selectAnswer(origIdx, btn, order) {
  if (answered) return;
  answered = true;

  document.querySelectorAll(".choice").forEach(b => b.disabled = true);

  const correct = origIdx === currentQ.ans;
  if (correct) {
    btn.classList.add("correct");
    totalCorrect++;
    document.getElementById("correct-count").textContent = totalCorrect;
    document.getElementById("feedback-text").innerHTML =
      '<span style="color:#86efac;font-weight:700">Correct! ⭐</span> Well done, ' + currentName + '!';
  } else {
    btn.classList.add("wrong");
    // highlight correct
    document.querySelectorAll(".choice").forEach((b, i) => {
      if (order[i] === currentQ.ans) b.classList.add("correct");
    });
    totalWrong++;
    document.getElementById("wrong-count").textContent = totalWrong;
    document.getElementById("feedback-text").innerHTML =
      '<span style="color:#fca5a5;font-weight:700">Not quite.</span> The answer was: <strong style="color:#facc15">' + currentQ.choices[currentQ.ans] + '</strong>';
  }

  results.push({ name: currentName, q: currentQ.q, correct });

  if (namePool.length === 0) {
    spinBtn.textContent = "See Results";
    spinBtn.disabled = false;
    spinBtn.onclick = showStats;
  } else {
    spinBtn.disabled = false;
    spinBtn.textContent = "🎰 Spin next!";
  }
}

// ── STATS SCREEN ─────────────────────────────────────────────────────────────
function showStats() {
  document.getElementById("slot-wrap").style.display   = "none";
  document.getElementById("q-card").style.display       = "none";
  document.getElementById("counters").style.display     = "none";
  document.getElementById("chosen-name-display").textContent = "";

  const screen = document.getElementById("stats-screen");
  screen.style.display = "block";

  const total = results.length;
  const correct = results.filter(r => r.correct).length;
  document.getElementById("final-score").textContent = correct + " / " + total;
  document.getElementById("final-sub").textContent =
    "correct answers across " + total + " students";

  const tbody = document.getElementById("stats-body");
  tbody.innerHTML = "";
  results.forEach(r => {
    const tr = document.createElement("tr");
    const short = r.q.length > 55 ? r.q.slice(0, 52) + "…" : r.q;
    tr.innerHTML =
      '<td style="font-weight:600;color:#C4B5FD">' + r.name + '</td>' +
      '<td>' + short + '</td>' +
      '<td class="' + (r.correct ? "tick" : "cross") + '">' + (r.correct ? "✓" : "✗") + '</td>';
    tbody.appendChild(tr);
  });
}

// ── RESET ─────────────────────────────────────────────────────────────────────
function resetGame() {
  namePool     = [...ALL_NAMES].sort(() => Math.random() - 0.5);
  questionPool = [...ALL_QUESTIONS].sort(() => Math.random() - 0.5);
  usedNames    = []; results = [];
  currentName = null; currentQ = null;
  totalCorrect = 0; totalWrong = 0;
  answered = false; spinning = false;

  document.getElementById("students-left").textContent = namePool.length;
  document.getElementById("correct-count").textContent = "0";
  document.getElementById("wrong-count").textContent   = "0";
  document.getElementById("chosen-name-display").textContent = "";

  document.getElementById("stats-screen").style.display    = "none";
  document.getElementById("slot-wrap").style.display       = "block";
  document.getElementById("q-card").style.display          = "none";
  document.getElementById("counters").style.display        = "flex";

  spinBtn.textContent = "🎰 Spin!";
  spinBtn.onclick     = startSpin;
  spinBtn.disabled    = false;

  buildReel();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
spinBtn.onclick = startSpin;
resetGame();
</script>
